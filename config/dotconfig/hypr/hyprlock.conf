# ~/.config/hypr/hyprlock.conf

# ВРЕМЯ (крупно)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 96
    font_family = JetBrains Mono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

# ДАТА (теперь значительно ниже)
label {
    monitor =
    text = cmd[update:3600000] echo "$(date +"%A, %d %B")"
    color = rgba(255, 255, 255, 0.6)
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = 0, 115   # спустил ниже для большого зазора
    halign = center
    valign = center
}

# ПОЛЕ ВВОДА ПАРОЛЯ
input-field {
    monitor =
    size = 300, 45
    outline_thickness = 2
    outer_color = rgba(255, 255, 255, 0.3)
    inner_color = rgba(0, 0, 0, 0.7)
    font_color = rgba(255, 255, 255, 1.0)
    
    placeholder_text = Password
    placeholder_color = rgba(255, 255, 255, 0.4)
    
    check_color = rgba(100, 255, 100, 0.3)
    fail_color = rgba(255, 100, 100, 0.3)
    fail_text = $FAIL
    
    rounding = 10
    border_size = 1
    border_color = rgba(255, 255, 255, 0.3)
    
    position = 0, 0
    halign = center
    valign = center
    
    fade_on_empty = true
    dots_spacing = 0.5
    dots_center = true
}
